client_max_body_size 60m;

proxy_read_timeout 120;
proxy_set_header X-Real-IP       $remote_addr;
proxy_set_header Host            $http_host;

# Tomcat may return cookies with Path=/orcid-web-frontend (with and without
# trailing slash). Rewrite app-specific paths first, then apply the generic
# rule. Keep path rewrites attribute-free to avoid malformed Set-Cookie values.
proxy_cookie_path /orcid-web-frontend/ "/";
proxy_cookie_path /orcid-web-frontend "/";
proxy_cookie_path / "/";

resolver 127.0.0.11;

# reg-ui-1
proxy_pass http://ui_frontend$app_path$request_uri;

# Redirect togglz calls from http to https
proxy_redirect http://$host/orcid-web-frontend/togglz/index https://$host/togglz/index;

proxy_redirect http://$host/orcid-web-frontend/ http://$host/;
proxy_redirect https://$host/orcid-web-frontend/ http://$host/;
