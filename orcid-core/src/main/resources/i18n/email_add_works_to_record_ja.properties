email.addWorks.subject=[ORCID] ORCIDレコードに研究成果を追加

email.addWorks.header.yourOrcidId=ご登録者様のORCID iD:
email.addWorks.header.yourOrcidRecordIs=あなたの ORCID レコードは
email.addWorks.header.dear=親愛なる

email.addWorks.weHaveNoticed=ORCIDレコードに研究成果が追加されていないことがわかりました。これらを追加することで、他のシステムに読み込んだりインポートしたりする際の管理負担を軽減し、あなたの研究貢献が認識され、同姓同名の他の研究者との曖昧さをなくすことができます！

email.addWorks.belowAreLinks=以下は、ORCID認定サービス2件へのリンクです。ここからORCIDアカウントにサインインし、選択した研究成果をORCIDレコードに追加することができます。
email.addWorks.connectingToTheseServices=これらのサービスに接続すると、新しい研究成果が利用可能になるにつれて、ORCIDレコードを自動的に更新する権限も付与されます。

email.addWorks.webOfScience=ORCIDレコードに研究成果を追加し、Web of Scienceの研究者プロフィールを連携することで、時間の経過に伴ってORCIDレコードを自動更新できます。
email.addWorks.theLens=レンズプロフィールを作成または接続して、特許やその他の学術著作を追加することで、時間の経過に伴ってORCIDレコードが自動的に更新されます。

email.addWorks.otherPopularServices=その他の人気サービスでは、ORCIDアカウントにサインインすることで、選択した研究成果をORCIDレコードに追加する権限をサービスに付与できます。

email.addWorks.crossrefMetaSearch=タイトル、著者名、DOI、またはORCID iDで検索し、学術論文、書籍、規格、データセットなどをORCIDレコードにインポートできます
email.addWorks.europePubMedCentral=生命科学分野の文献、学術論文、プレプリント、特許 (PubMed Centralに登録されている全論文を含む) をORCIDレコードにインポートできます
email.addWorks.scopus=Scopusアカウントを作成し、接続してください。ORCIDレコードにScopus著者IDを追加して、作品をインポートすることができます

email.addWorks.ifYouAreHavingTrouble=研究成果の追加に問題がある場合、またはORCIDレコードにデータを追加する方法について詳しくお知りになりたい場合は、以下をご覧ください。
