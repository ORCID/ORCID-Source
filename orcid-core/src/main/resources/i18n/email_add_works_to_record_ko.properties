email.addWorks.weHaveNoticed=아직 ORCID 레코드에 아무 연구 성과물도 추가하지 않으셨습니다. 이것을 추가하면 다른 시스템으로 읽고 가져올 때 관리 부담이 줄어들고, 연구에 기여했다는 인정을 받을 수 있으며, 동명의 타 연구자와 쉽게 구분되게 됩니다!

email.addWorks.belowAreLinks=아래에 링크로 소개된 2가지 ORCID 인증 서비스를 이용하면 ORCID 계정에 로그인해 선택한 연구 성과물을 ORCID 레코드로 추가할 수 있습니다.
email.addWorks.connectingToTheseServices=이들 서비스를 연결하면 앞으로 새로운 연구 성과물이 올라올 때마다 귀하의 ORCID 레코드를 자동으로 업데이트할 수 있는 권한을 부여하게 됩니다.

email.addWorks.webOfScience=연구 성과물을 ORCID 레코드에 추가하여 Web of Science 연구자 프로필을 연결하고 앞으로 ORCID 레코드를 자동 업데이트합니다.
email.addWorks.theLens=Lens 프로필을 생성 또는 연결하여 특허 및 기타 학술 연구업적을 추가하고 앞으로 ORCID 레코드를 자동 업데이트합니다.

email.addWorks.otherPopularServices=다른 인기 있는 서비스를 이용하면 ORCID 계정에 로그인하고 서비스에 권한을 부여해 선택한 연구 성과물을 ORCID 레코드로 추가할 수 있습니다.

email.addWorks.crossrefMetaSearch=제목, 저자, DOI, ORCID iD로 저널 기사, 저서, 표준, 데이터세트 등을 검색하여 ORCID 레코드로 연구업적을 가져옵니다
email.addWorks.europePubMedCentral=PubMed Central에 의해 색인된 모든 기사 포함, 생명과학 논문, 저널 기사, 프리프린트, 특허를 ORCID 레코드로 가져옵니다
email.addWorks.scopus=Scopus 계정을 생성 및 연결하여 Scopus Author ID를 ORCID 레코드에 추가하고 연구업적을 가져옵니다

email.addWorks.ifYouAreHavingTrouble=연구 성과물을 추가하는 데 문제가 있거나 ORCID 레코드에 데이터를 추가하는 방법을 더 자세히 알고 싶다면 다음 페이지를 방문하십시오.
