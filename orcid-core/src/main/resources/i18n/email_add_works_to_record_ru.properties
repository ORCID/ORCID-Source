
email.addWorks.header.yourOrcidId=Ваш ORCID iD:
email.addWorks.header.yourOrcidRecordIs=Ваш профиль ORCID —

email.addWorks.weHaveNoticed=Мы заметили, что вы еще не добавили результаты исследования в свою запись ORCID. Добавление этих результатов поможет снизить вашу административную нагрузку при чтении и импортировании в другие системы, обеспечит признание вашего исследовательского вклада и позволит отличить вас от других исследователей с тем же именем!

email.addWorks.belowAreLinks=Ниже приведены ссылки на 2 сервиса, сертифицированных ORCID, которые позволяют заходить в аккаунт и добавлять выбранные результаты исследований в профиль.
email.addWorks.connectingToTheseServices=Подключившись к этим сервисам, вы даете разрешение автоматически обновлять профиль ORCID по мере появления новых результатов исследований.

email.addWorks.webOfScience=Добавляйте результаты исследований в профиль ORCID. Чтобы автоматически обновлять его, подключите профиль исследователя Web of Science.
email.addWorks.theLens=Создайте или подключите профиль Lens, чтобы добавлять патенты и другие научные работы, а также автоматически обновлять профиль ORCID.

email.addWorks.otherPopularServices=Другие популярные сервисы позволяют заходить в профиль ORCID и разрешать сервису добавлять туда выбранные вами результаты исследований.

email.addWorks.crossrefMetaSearch=Ищите статьи, книги, стандарты, наборы данных и другое по названию, автору, DOI или ORCID iD, чтобы импортировать работы в профиль ORCID.
email.addWorks.europePubMedCentral=Импортируйте в профиль ORCID литературу по естественным наукам, статьи, препринты и патенты, включая все статьи, проиндексированные PubMed Central.
email.addWorks.scopus=Создайте и подключите аккаунт Scopus, чтобы добавить Scopus Author ID в профиль ORCID и импортировать работы.

email.addWorks.ifYouAreHavingTrouble=Если у вас возникли проблемы с добавлением результатов исследования, или вы хотите узнать больше о том, как добавить данные в свою запись ORCID, посетите наш
email.addWorks.orcidHelpCenter=Справочный центр ORCID

email.addWorks.footer.warmRegards=С наилучшими пожеланиями,
