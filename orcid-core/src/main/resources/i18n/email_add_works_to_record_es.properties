email.addWorks.weHaveNoticed=Hemos observado que aún no ha añadido ningún resultado de la investigación a su registro ORCID. Si lo hace, podrá reducir su carga administrativa una vez que los haya leído e importado a otros sistemas, garantizar que se reconozcan sus contribuciones a la investigación y diferenciarse de otros investigadores que se llamen igual que usted.

email.addWorks.belowAreLinks=A continuación, le presentamos los enlaces a dos servicios certificados por ORCID. Utilícelos para iniciar sesión en su cuenta ORCID y añadir los resultados de investigación que haya seleccionado a su registro ORCID.
email.addWorks.connectingToTheseServices=Al conectarse a estos servicios, también se habilita la actualización automática de su registro ORCID a medida que se publiquen nuevos resultados de investigación.

email.addWorks.webOfScience=Añada los resultados de sus investigaciones a su registro ORCID y vincule su perfil de investigador de Web of Science para actualizar automáticamente su registro ORCID a lo largo del tiempo.
email.addWorks.theLens=Cree o vincule su perfil de Lens para añadir patentes y otras obras académicas y actualizar automáticamente su registro ORCID a lo largo del tiempo.

email.addWorks.otherPopularServices=Puede utilizar otros servicios populares para iniciar sesión en su registro ORCID y conceder permiso para que el servicio añada los resultados de la investigación que haya seleccionado a su registro ORCID.

email.addWorks.crossrefMetaSearch=Busque artículos de revistas, libros, normas, conjuntos de datos, etc. por título, autor, DOI o ORCID iD para importar obras a su registro ORCID
email.addWorks.europePubMedCentral=Importe literatura sobre ciencias biológicas, artículos de revistas, preimpresiones y patentes (incluidos todos los artículos indexados por PubMed Central) a su registro ORCID
email.addWorks.scopus=Cree y vincule su cuenta de Scopus para añadir su ID de autor de Scopus a su registro ORCID e importar obras

