email.addWorks.subject=[ORCID] Přidejte výstupy výzkumu do svého záznamu ORCID

email.addWorks.header.yourOrcidId=Vaše ORCID iD:
email.addWorks.header.yourOrcidRecordIs=Váš ORCID záznam je
email.addWorks.header.dear=Vážený/Vážená

email.addWorks.weHaveNoticed=Všimli jsme si, že jste ještě nepřidali žádné výstupy výzkumu do svého záznamu ORCID. Jejich přidání pomůže snížit vaši administrativní zátěž, až se načtou a importují do dalších systémů, a zajistí, že budete uznáváni za své příspěvky výzkumu, a jednoznačně vás odliší od dalších výzkumníků se stejným jménem!

email.addWorks.belowAreLinks=Níže jsou odkazy na 2 služby certifikované organizací ORCID, které vám umožňují přihlásit se k vašemu účtu ORCID a přidat vybrané výstupy výzkumu do vašeho záznamu ORCID.
email.addWorks.connectingToTheseServices=Připojení k těmto službám také umožňuje postupnou automatickou aktualizaci vašeho záznamu ORCID – jakmile budou k dispozici nové výstupy výzkumu.

email.addWorks.webOfScience=Přidejte si výstupy výzkumu do vašeho záznamu ORCID a připojte váš profil výzkumníka na Web of Science, aby docházelo k postupné automatické aktualizaci vašeho záznamu ORCID.
email.addWorks.theLens=Vytvořte nebo připojte váš profil Lens pro přidání patentů a dalších vědeckých prací a postupně automaticky aktualizujte váš záznam ORCID.

email.addWorks.otherPopularServices=Další oblíbené služby vám umožňují přihlásit se k vašemu účtu ORCID a udělují tak službě povolení k přidání vámi vybraných výstupů výzkumu do vašeho záznamu ORCID.

email.addWorks.crossrefMetaSearch=Vyhledávejte články v časopisech, knihy, normy, datové sady a další podle názvu, autora, DOI nebo ORCID ID a importujte tak práce do vašeho záznamu ORCID.
email.addWorks.europePubMedCentral=Importujte literaturu z oblasti přírodních věd, články v časopisech, předtisky a patenty, včetně všech článků indexovaných podle PubMed Central, do vašeho záznamu ORCID
email.addWorks.scopus=Vytvořte a připojte váš účet Scopus, abyste mohli přidat vaše ID autora Scopus do vašeho záznamu ORCID a importovat práce

email.addWorks.ifYouAreHavingTrouble=Pokud máte potíže s přidáváním svých výstupů výzkumu nebo byste se chtěli dozvědět víc o tom, jak přidávat údaje do vašeho záznamu ORCID, navštivte prosím naše
email.addWorks.orcidHelpCenter=Centrum pomoci ORCID

