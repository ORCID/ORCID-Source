email.addWorks.subject=[ORCID] Fügen Sie Ihrem ORCID-Eintrag Forschungsergebnisse hinzu

email.addWorks.header.yourOrcidId=Ihre ORCID-iD:
email.addWorks.header.yourOrcidRecordIs=Ihr ORCID-Eintrag lautet
email.addWorks.header.dear=Guten Tag

email.addWorks.weHaveNoticed=Es ist uns aufgefallen, dass Sie Ihrem ORCID-Eintrag noch keine Forschungsergebnisse hinzugefügt haben. Indem Sie sie einpflegen, verringert sich der administrative Aufwand, wenn sie gelesen und in andere Systeme importiert werden. Außerdem wird dadurch sichergestellt, dass Ihr Forschungsbeitrag anerkannt wird und dass Sie sich von anderen Forschern mit demselben Namen abgrenzen können.

email.addWorks.belowAreLinks=Nachstehend finden Sie Links zu zwei Diensten mit ORCID-Zertifizierung, mit denen Sie sich bei Ihrem ORCID-Konto anmelden und Ihre ausgewählten Forschungsergebnisse Ihrem ORCID-Eintrag hinzufügen können.
email.addWorks.connectingToTheseServices=Durch die Verbindung mit diesen Diensten wird auch die Berechtigung erteilt, Ihren ORCID-Eintrag im Laufe der Zeit automatisch zu aktualisieren, sobald neue Forschungsergebnisse verfügbar werden.

email.addWorks.webOfScience=Fügen Sie Forschungsergebnisse zu Ihrem ORCID-Eintrag hinzu und verbinden Sie Ihr Web of Science-Forscherprofil, um Ihren ORCID-Eintrag im Laufe der Zeit automatisch zu aktualisieren.
email.addWorks.theLens=Erstellen Sie Ihr Lens-Profil oder verbinden Sie es, um Patente und andere wissenschaftliche Arbeiten hinzuzufügen und Ihren ORCID-Eintrag im Laufe der Zeit automatisch zu aktualisieren.

email.addWorks.otherPopularServices=Andere beliebte Dienste ermöglichen es Ihnen, sich bei Ihrem ORCID-Konto anzumelden. Dies ermöglicht es dem Dienst, Ihre ausgewählten Forschungsergebnisse zu Ihrem ORCID-Eintrag hinzuzufügen.

email.addWorks.crossrefMetaSearch=Suchen Sie mit Titel, Autor, DOI oder ORCID-iD nach Zeitschriftenartikeln, Büchern, Normen, Datensätzen und mehr, um Werke in Ihren ORCID-Eintrag zu importieren.
email.addWorks.europePubMedCentral=Importieren Sie Literatur aus den Lebenswissenschaften, Zeitschriftenartikel, Vorabdrucke und Patente, einschließlich aller von PubMed Central indexierten Artikel, in Ihren ORCID-Eintrag.
email.addWorks.scopus=Erstellen Sie Ihr Scopus-Konto und verbinden Sie es, um Ihre Scopus-Autoren-ID zu Ihrem ORCID-Eintrag hinzuzufügen und Werke zu importieren.

email.addWorks.ifYouAreHavingTrouble=Wenn Sie Probleme beim Hinzufügen Ihrer Forschungsergebnisse haben oder gerne mehr über das Hinzufügen von Daten zu Ihrem ORCID-Eintrag erfahren möchten, besuchen Sie bitte unser
email.addWorks.orcidHelpCenter=ORCID-Hilfezentrum

