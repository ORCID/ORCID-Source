email.addWorks.weHaveNoticed=Nous avons remarqué que vous n'avez pas encore ajouté de résultats de recherche à votre dossier ORCID. L'ajout de ces résultats vous aidera à réduire votre charge administrative lorsqu'ils seront lus et importés dans d'autres systèmes, à vous assurer une reconnaissance pour vos contributions à la recherche et à vous distinguer des autres chercheurs portant le même nom !

email.addWorks.belowAreLinks=Voici des liens vers deux services certifiés par ORCID qui vous permettront de vous connecter à votre compte ORCID et d'ajouter vos travaux de recherche sélectionnés à votre dossier ORCID.
email.addWorks.connectingToTheseServices=En vous connectant à ces services, vous les autorisez également à mettre à jour automatiquement votre dossier ORCID lorsque de nouveaux travaux de recherche sont disponibles.

email.addWorks.webOfScience=Ajoutez des résultats de recherche à votre dossier ORCID et connectez votre profil de chercheur Web of Science pour mettre à jour automatiquement votre dossier ORCID.
email.addWorks.theLens=Créez ou connectez votre profil Lens pour ajouter des brevets et d'autres travaux scientifiques et mettre à jour automatiquement votre dossier ORCID.

email.addWorks.otherPopularServices=D'autres services populaires vous permettent de vous connecter à votre compte ORCID et d'autoriser le service à ajouter vos travaux de recherche sélectionnés à votre dossier ORCID.

email.addWorks.crossrefMetaSearch=Recherchez des articles de revues, des livres, des normes, des dépôts de données et plus encore par titre, auteur, DOI ou ORCID iD pour importer des travaux dans votre dossier ORCID.
email.addWorks.europePubMedCentral=Importez des publications scientifiques en sciences de la vie, des articles de revues, des prépublications et des brevets, y compris tous les articles indexés par PubMed Central, dans votre dossier ORCID.
email.addWorks.scopus=Créez et connectez votre compte Scopus pour ajouter votre identifiant d'auteur Scopus à votre dossier ORCID et importer des travaux.

email.addWorks.ifYouAreHavingTrouble=Si vous rencontrez des difficultés pour ajouter vos résultats de recherche ou si vous souhaitez en savoir plus sur la façon d'ajouter des données à votre dossier ORCID, veuillez consulter notre
