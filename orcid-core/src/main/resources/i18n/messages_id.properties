deactivate_orcid.gdpr_once=Once your account is deactivated, only a hashed version of your email address will be retained by the ORCID Registry; all data connected with your ORCID record will be deleted. Once you have deactivated your account, you will not be able to register for a new account using any of the email addresses associated with your account. However you can reactivate your account at any time.
