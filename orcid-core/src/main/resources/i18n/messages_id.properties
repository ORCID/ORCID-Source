register.paragraph.2=You can also choose to receive emails from us about new features and tips for making the most of your ORCID record.
register.paragraph.3=To receive these emails, you will also need to verify your primary email address.
register.paragraph.4=After you've registered, you can change your notification settings at any time in the account settings section of your ORCID record.
