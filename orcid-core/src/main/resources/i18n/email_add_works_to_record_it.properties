email.addWorks.weHaveNoticed=Abbiamo notato che non hai ancora aggiunto risultati di ricerca al tuo record ORCID. Aggiungerli ti aiuterà a ridurre il carico amministrativo quando vengono letti e importati in altri sistemi, assicurando che ti si riconosca per i tuoi contributi alla ricerca e che ti si distingua da altri ricercatori con lo stesso nome!

email.addWorks.belowAreLinks=Di seguito trovi i link a 2 servizi certificati ORCID che ti consentono di accedere al tuo account ORCID e di aggiungere i risultati di ricerca selezionati al tuo record ORCID.
email.addWorks.connectingToTheseServices=Il collegamento a questi servizi ti consente inoltre di aggiornare automaticamente il tuo record ORCID nel tempo man mano che sono disponibili nuovi risultati di ricerca.

email.addWorks.webOfScience=Aggiungi i risultati di ricerca al tuo record ORCID e collega il tuo profilo ricercatore Web of Science per aggiornare automaticamente il tuo record ORCID nel tempo.
email.addWorks.theLens=Crea o collega il tuo profilo Lens per aggiungere brevetti e altri lavori accademici e aggiornare automaticamente il tuo record ORCID nel tempo.

email.addWorks.otherPopularServices=Altri servizi popolari ti consentono di accedere al tuo account ORCID e di concedere l’autorizzazione al servizio per aggiungere al tuo record ORCID i risultati di ricerca selezionati.

email.addWorks.crossrefMetaSearch=Cerca per titolo, autore, DOI o ID ORCID tra articoli di riviste, libri, standard, set di dati e altro per importare i lavori nel tuo record ORCID
email.addWorks.europePubMedCentral=Importa letteratura relativa alle scienze della vita, articoli di riviste, preprint e brevetti, inclusi tutti gli articoli indicizzati da PubMed Central, nel tuo record ORCID
email.addWorks.scopus=Crea e collega il tuo account Scopus per aggiungere il tuo ID autore Scopus al tuo record ORCID e importare i lavori

