email.addWorks.weHaveNoticed=Reparámos que ainda não adicionou resultados de investigação ao seu registo ORCID. Ao fazê-lo, poderá reduzir a carga administrativa quando estes forem lidos e importados para outros sistemas, garantir que recebe reconhecimento pela sua contribuição e distinguir-se de outros investigadores com o mesmo nome.

email.addWorks.belowAreLinks=Abaixo estão as ligações para 2 serviços certificados pela ORCID que permitem entrar na sua conta ORCID e adicione os resultados de pesquisa selecionados ao seu registo ORCID.
email.addWorks.connectingToTheseServices=A ligação a estes serviços também concede permissão para atualizar automaticamente o seu registo ORCID ao longo do tempo, à medida que novos resultados de investigação forem disponibilizados.

email.addWorks.webOfScience=Adicione resultados de investigação ao seu registo ORCID e ligue o seu perfil de investigador da Web of Science para atualizar automaticamente o seu registo ORCID ao longo do tempo.
email.addWorks.theLens=Crie ou conecte o seu Perfil Lens para adicionar patentes e outros trabalhos académicos e atualizar automaticamente o seu registo ORCID ao longo do tempo.

email.addWorks.otherPopularServices=Outros serviços populares permitem entrar na sua conta ORCID, concedendo permissão ao serviço para adicionar os resultados de pesquisa selecionados ao seu registo ORCID.

email.addWorks.crossrefMetaSearch=Pesquise por título, autor, DOI ou ORCID iD para artigos de revistas, livros, normas, conjuntos de dados e muito mais para importar trabalhos para o seu registo ORCID.
email.addWorks.europePubMedCentral=Importe literatura sobre ciências da vida, artigos de revistas científicas, pré-impressões e patentes, incluindo todos os artigos indexados pelo PubMed Central, para o seu registo ORCID.
email.addWorks.scopus=Crie e conecte a sua conta Scopus para adicionar o seu ID de autor Scopus ao seu registo ORCID e importar trabalhos

