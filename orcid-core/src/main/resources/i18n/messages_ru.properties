record_corrections.principle_is=принцип — индивидуальный контроль. Это значит, что вы сами контролируете свои данные. Однако, по ограниченному ряду причин, ORCID может самостоятельно корректировать недопустимые данные в записи, которые появились в результате ошибки системы. Мы не меняем некорректные данные. Все изменения недопустимых данных указаны ниже.
