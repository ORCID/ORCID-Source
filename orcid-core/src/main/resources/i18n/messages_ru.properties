workspace.qrcode.detail_1=QR-код — это машиночитаемое графическое изображенрие, которое содержит информацию, обычно URL-адрес веб-сайта. Ваш QR-код ORCID iD является уникальным и представляет собой ваш ORCID iD. Любой, кто сканирует его с помощью программы считывания QR-кодов на мобильном телефоне, попадет в вашу публичную запись ORCID.
workspace.qrcode.detail_2=Скачайте QR-код своего ORCID iD  и размещайте его на плакатах, в презентациях, наклейках, визитных карточках — везде, где вы хотите, чтобы другие смогли найти ваш ORCID iD!
