social.link.unsupported.why_cant_i=* Почему я не могу войти в систему, используя аккаунт в своей организации? Есть несколько причин такой ситуации. Во-первых, хотя мы договорились с тысячами учреждений во всем мире о том, что пользователи могут входить в их аккаунт ORCID, используя учетные данные в своей организации, эти договоренности охватывают только те организации, которые принадлежат двум поддерживающим нас в настоящее время федерациям (SurfConext, Edugain). Во-вторых, некоторые учреждения еще не предоставили нам информацию, необходимую для связи вашего аккаунта в организации с вашим аккуантом ORCID.
