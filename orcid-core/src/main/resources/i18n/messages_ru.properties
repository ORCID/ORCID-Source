deactivate_orcid.gdpr_learn_more=Узнайте больше о закрытии аккаунта ORCID
deactivate_orcid.gdpr_once=Как только ваш аккаунт будет деактивирован, только хэш-версия вашего адреса электронной почты будет сохранена в реестре ORCID. Все данные, подключенные к вашей записи ORCID, будут удалены. После того как вы деактивируете свой аккаунт, вы не сможете зарегистрировать новый аккаунт, используя любой из адресов электронной почты, связанных с вашим аккаунтом. Однако вы еще можете повторно активировать свой аккаунт в любое время.
deactivate_orcid.gdpr_you_may=Вы можете закрыть аккаунт ORCID в любое время, деактивировав его. При получении запроса о деактивации аккаунта ORCID будет использовать односторонний хэш, сохраненный в личном файле данных, вашего адреса электронной почты. Это предотвратит регистрацию адреса электронной почты в другом ORCID iD в будущем. Все остальные данные в вашем аккаунте будут удалены.
