social.link.unsupported.you_can_find_out.2=здесь
social.link.unsupported.you_can_find_out.3=.
social.link.unsupported.email.body=Я получил сообщение об ошибке, когда попытался войти в учетную запись ORCID для поставщика услуг, используя логин и пароль организации. Служба поддержки ORCID предложила, чтобы я отправил вам эту заметку, сопроводив некоторыми подробностями. ORCID требует, чтобы к учетной записи был привязан уникальный идентификатор. Подробности по ссылке https\://members.orcid.org/institution-sign-in.
