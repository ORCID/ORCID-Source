register.label.notification_settings=Настройки уведомлений
register.paragraph.1=ORCID отправляет уведомления по электронной почте о вопросах, связанных с вашим аккаунтом, безопасностью и конфиденциальностью, включая запросы от организаций-членов ORCID  о разрешении обновления вашей записи, и изменениями, внесенными в вашу запись этими организациями.
register.paragraph.2=Вы также можете выбрать получение эл. писем от нас о новых функциях и советах, чтобы масксимально выгодно использовать свою запись ORCID.
register.paragraph.3=Чтобы получать эти письма, вам также нужно будет подтвердить свой основной адрес эл. почты.
register.paragraph.4=После регистрации вы сможете изменить настройки уведомлений в любое время в разделе «Настройки аккаунта» в вашей записи ORCID.
