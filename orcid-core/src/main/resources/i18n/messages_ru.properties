register.labelORCIDprovides=ORCID предоставляет неизменный цифровой идентификатор, идентифицирующий Вас среди других научных работников. Благодаря интеграции идентификаторов ORCID в ключевые рабочие процессы (например, в рассмотрение рукописей и заявок на получение грантов), ORCID поддерживает автоматизированные связи между Вами и Вашей профессиональной деятельностью, обеспечивая признание Вашей научной работы.
