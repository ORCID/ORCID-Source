email.addWorks.header.dear=亲爱的

email.addWorks.weHaveNoticed=我们注意到您尚未在 ORCID 记录中添加任何研究成果。添加这些信息将有助于减轻您在被读取和导入其他系统时的管理负担，确保您的研究贡献得到认可，并将您与其他同名研究人员区分开来！

email.addWorks.belowAreLinks=以下是 2 个经 ORCID 认证的服务链接，通过这些服务，您可以登录 ORCID 帐户，并将选定的研究成果添加至您的 ORCID 记录中。
email.addWorks.connectingToTheseServices=连接至相关服务亦可随着时间的推移，在新研究成果可用时授权自动更新您的 ORCID 记录。

email.addWorks.webOfScience=将研究成果添加至 ORCID 记录中，并连接您的 Web of Science 研究员配置文件，可随着时间的推移自动更新您的 ORCID 记录。
email.addWorks.theLens=创建或连接您的 Lens 配置文件，以添加专利和其他学术作品，并随着时间的推移自动更新您的 ORCID 记录。

email.addWorks.otherPopularServices=其他热门服务允许您登录 ORCID 帐户，授权该服务将您选择的研究成果添加至您的 ORCID 记录中。

email.addWorks.crossrefMetaSearch=按标题、作者、DOI 或 ORCID iD 号搜索期刊文章、书籍、标准、数据集等，将作品导入至您的 ORCID 记录
email.addWorks.europePubMedCentral=将生命科学文献、期刊文章、预印本和专利，包括 PubMed Central 索引的所有文章，导入您的 ORCID 记录
email.addWorks.scopus=创建并连接您的 Scopus 帐户，将 Scopus 作者 ID 添加至您的 ORCID 记录并导入作品

email.addWorks.ifYouAreHavingTrouble=如果您在添加研究成果时遇到困难，或想进一步了解如何将数据添加到您的 ORCID 记录中，请访问我们的
