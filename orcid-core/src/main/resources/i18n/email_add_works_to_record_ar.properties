email.addWorks.weHaveNoticed=لاحظنا أنك لم تقم بعد بإضافة أي مخرجات بحثية إلى سجل ORCID الخاص بك. ستساعد إضافة هذه العناصر في تقليل العبء الإداري عند قراءتها واستيرادها إلى أنظمة أخرى، والتأكد من الإقرار بمساهماتك البحثية، وتميّزك عن الباحثين الآخرين الذين يحملون الاسم نفسه!

email.addWorks.belowAreLinks=فيما يلي روابط لخدمتين من خدمات ORCID المعتمدة التي تتيح لك تسجيل الدخول إلى حسابك على ORCID وإضافة مخرجات البحث المختارة إلى سجل ORCID الخاص بك.
email.addWorks.connectingToTheseServices=يمنحك الاتصال بهذه الخدمات أيضًا الإذن بتحديث سجل ORCID الخاص بك تلقائيًا مع مرور الوقت مع توافر مخرجات بحث جديدة.

email.addWorks.webOfScience=أضف مخرجاتك البحثية إلى سجل ORCID الخاص بك، واربط ملفك التعريفي كباحث في "شبكة العلوم" لتحديث سجل ORCID تلقائيًا بمرور الوقت.
email.addWorks.theLens=يمكنك إنشاء أو ربط ملفك التعريفي في Lens لإضافة براءات الاختراع والأعمال العلمية الأخرى، وتحديث سجل ORCID الخاص بك تلقائيًا بمرور الوقت.

email.addWorks.otherPopularServices=تتيح لك خدمات شائعة أخرى تسجيل الدخول إلى حساب ORCID الخاص بك، مما يمنح الخدمة الإذن لإضافة المخرجات البحثية التي تختارها إلى سجل ORCID الخاص بك.

email.addWorks.crossrefMetaSearch=يمكن البحث باستخدام العنوان أو المؤلف أو معرف الوثيقة الرقمية (DOI) أو معرف ORCID عن مقالات المجلات والكتب والمعايير ومجموعات البيانات وغيرها، لاستيراد الأعمال إلى سجل ORCID الخاص بك
email.addWorks.europePubMedCentral=يمكن استيراد الأدبيات الخاصة بعلوم الحياة، ومقالات المجلات، والمسوّدات الأولية، وبراءات الاختراع، بما في ذلك جميع المقالات المفهرسة في PubMed Central، إلى سجل ORCID الخاص بك
email.addWorks.scopus=يمكن إنشاء وربط حسابك في Scopus لإضافة معرف المؤلف الخاص بك في Scopus إلى سجل ORCID واستيراد الأعمال فيه

email.addWorks.ifYouAreHavingTrouble=إذا كنت تواجه مشكلة في إضافة مخرجات بحثك أو كنت ترغب في معرفة المزيد حول كيفية إضافة البيانات إلى سجل ORCID الخاص بك، يُرجى زيارة موقعنا
